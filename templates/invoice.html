<!DOCTYPE html>
<html>
<head>
    <title>Invoice</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        .navbar {
            background-color: #1f2a38;
            color: white;
            padding: 10px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-right: 10px;
        }

        .right {
            float: right;
        }

        .container {
            margin-top: 20px;
        }

        button {
            padding: 8px 12px;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <span>
        <a href="/dashboard">Dashboard</a> |
        <a href="/products">Products</a> |
        <a href="/billing">Billing</a> |
        <a href="/bills">Bills</a>
    </span>

    <span class="right">
        Welcome, {{ session['user'] }} |
        <a href="/logout" style="color:red;">Logout</a>
    </span>
</div>

<!-- INVOICE CONTENT -->
<div class="container">

    <h2>Invoice 🧾</h2>

    <p><b>Bill ID:</b> {{ bill['id'] }}</p>
    <p><b>Product:</b> {{ bill['name'] }}</p>
    <p><b>Quantity:</b> {{ bill['quantity'] }}</p>
    <p><b>Total:</b> ₹{{ bill['total'] }}</p>
    <p><b>Date:</b> {{ bill['date'] }}</p>

    <hr>

    <!-- ACTION BUTTONS -->
    <button onclick="window.print()">Print Invoice</button>

    <br><br>

    <a href="/billing">
        <button>New Sale</button>
    </a>

    <a href="/dashboard">
        <button>Dashboard</button>
    </a>

</div>

</body>
</html>
