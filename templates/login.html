<!DOCTYPE html>
<html>
<head>
    <title>Login — Invenzo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 45px 40px;
            width: 380px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .brand-icon {
            width: 52px;
            height: 52px;
            background: #1e3a5f;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 16px;
        }

        .glass-card h2 {
            font-size: 22px;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .glass-card p {
            font-size: 13px;
            color: #475569;
            margin-bottom: 28px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            outline: none;
            transition: all 0.2s;
            color: #0f172a;
        }

        .form-group input:focus {
            border-color: #2563eb;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        .error-msg {
            background: rgba(254, 226, 226, 0.8);
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: left;
            border-left: 3px solid #dc2626;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        .login-btn:hover {
            background: #1e4fb9;
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-footer {
            margin-top: 20px;
            font-size: 11px;
            color: #64748b;
        }
    </style>
</head>

<body style="background: url('/static/sky.jpg.png') center/cover no-repeat;">

    <div class="glass-card">

        <div class="brand-icon">📦</div>

        <h2>Welcome back</h2>
        <p>Sign in to your Invenzo account</p>

        {% if error %}
        <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="login-btn">Sign In →</button>

        </form>

        <div class="login-footer">
            Invenzo v1.0 &nbsp;|&nbsp; Retail & Inventory System
        </div>

    </div>
</body>
</html>
