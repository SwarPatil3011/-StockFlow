<!DOCTYPE html>
<html>
<head>
    <title>Billing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div style="display:flex;">

    <!-- SIDEBAR -->
    <div style="width:220px; height:100vh; background:#021b36; color:white; padding:10px; display:flex; flex-direction:column;">
        
        <!-- TOP MENU -->
        
            <h2 style="margin-bottom:30px;">StockFlow</h2>

            <div style="display:flex; flex-direction:column; gap:10px;"></div>       

            <a href="/dashboard" style="padding:8px; border-radius:6px; color:white; text-decoration:none;">Dashboard</a></p>
            <a href="/products" style="padding:8px; border-radius:6px; color:white; text-decoration:none;">Products</a></p>
            <a href="/billing" style="padding:8px; border-radius:6px; color:white; text-decoration:none;">Billing</a></p>
            <a href="/bills" style="padding:8px; border-radius:6px; color:white; text-decoration:none;">Bills</a></p>
            <a href="/logout" style="padding:8px; border-radius:6px; color:white; text-decoration:none;">logout</a></p>

    </div>

    <!-- MAIN CONTENT -->
    <div style="flex:1; padding:20px;">
<h2>Billing Page</h2>

<form method="POST">

    <label>Select Product:</label>
    <select name="product_id">
    {% for p in products %}
        <option value="{{ p['id'] }}">
            {{ p['name'] }} - ₹{{ p['price'] }}
        </option>
    {% endfor %}
    </select>

    <br><br>

    <label>Quantity:</label>
    <input type="number" name="quantity" required>

    <br><br>

    <button type="submit">Calculate</button>

</form>

{% if total %}
    <h3>Total Amount: ₹{{ total }}</h3>
{% endif %}

    </div>
</body>
</html>
