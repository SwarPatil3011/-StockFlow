<!DOCTYPE html>
<html>
<head>
    <title>Billing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <a href="/" style="color:white; text-decoration:none;">Dashboard</a> |
    <a href="/products" style="color:white; text-decoration:none;">Products</a> |
    <a href="/billing" style="color:white; text-decoration:none;">Billing</a> |
     <a href="/bills" style="color:white; text-decoration:none;">Bills</a>
</div>

<h2>Billing Page</h2>

<form method="POST">

    <label>Select Product:</label>
    <select name="product_id">
    {% for p in products %}
        <option value="{{ p['id'] }}">
            {{ p['name'] }} - ₹{{ p['price'] }}
        </option>
    {% endfor %}
    </select>

    <br><br>

    <label>Quantity:</label>
    <input type="number" name="quantity" required>

    <br><br>

    <button type="submit">Calculate</button>

</form>

{% if total %}
    <h3>Total Amount: ₹{{ total }}</h3>
{% endif %}

</body>
</html>
