<!DOCTYPE html>
<html>
<head>
    <title>Billing</title>
</head>
<body>

<h2>Billing Page</h2>

<form method="POST">

    <label>Select Product:</label>
    <select name="product_id">
        {% for p in products %}
            <option value="{{ p[0] }}">
                {{ p[1] }} (₹{{ p[2] }})
            </option>
        {% endfor %}
    </select>

    <br><br>

    <label>Quantity:</label>
    <input type="number" name="quantity" required>

    <br><br>

    <button type="submit">Calculate</button>

</form>

{% if total %}
    <h3>Total Amount: ₹{{ total }}</h3>
{% endif %}

</body>
</html>
