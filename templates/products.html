<!DOCTYPE html>
<html>
    <head>
        <title>Products - StockFlow</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
    </head>
    <body>

        <div class="navbar">
    <a href="/" style="color:white; text-decoration:none;">Dashboard</a> |
    <a href="/products" style="color:white; text-decoration:none;">Products</a> |
    <a href="/billing" style="color:white; text-decoration:none;">Billing</a> |
     <a href="/bills" style="color:white; text-decoration:none;">Bills</a>
</div>

        <div class="container">

    <!-- Heading Card -->
    <div class="card">
        <h2>Products Page 📦</h2>
    </div>

    <!-- 🔍 SEARCH FORM GOES HERE -->
 <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
    
    <form method="GET" action="/products">
        <input type="text" name="search" placeholder="Search product name">
        <button type="submit">Search</button>
    </form>

    <button onclick="openModal()">+ Add Product</button>

</div>

 <!-- Products Table -->
    <div class="card">
        <table border="1" width="100%" cellpadding="10">
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Action</th>
            </tr>

            {% for product in products %}
            <tr>
                <td>{{ product.name }}</td>
                <td>₹ {{ product.price }}</td>
                <td>{{ product.quantity }}</td>
                <td>
                    <a href="/edit_product/{{ product.id }}">Edit</a>

                    <form method="POST" action="/delete_product/{{ product.id }}" style="display:inline;">
                        <button type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}

        </table>
    </div>

<div id="addModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">

    <div style="background:white; width:400px; margin:100px auto; padding:20px; border-radius:10px;">
        
        <h3>Add Product</h3>

        <form method="POST" action="/add_product">
            <input type="text" name="name" placeholder="Product Name" required><br><br>
            <input type="number" name="price" placeholder="Price" required><br><br>
            <input type="number" name="quantity" placeholder="Quantity" required><br><br>

            <button type="submit">Add</button>
            <button type="button" onclick="closeModal()">Cancel</button>
        </form>

    </div>
</div>

<script>
function openModal() {
    document.getElementById("addModal").style.display = "block";
}

function closeModal() {
    document.getElementById("addModal").style.display = "none";
}
</script>

</div>

</body>
</html>
